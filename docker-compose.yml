version: "3.9"

services:
  # ── PostgreSQL Database ──────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: nirf_postgres
    environment:
      POSTGRES_DB: nirf_platform
      POSTGRES_USER: nirf_user
      POSTGRES_PASSWORD: nirf_secure_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nirf_user -d nirf_platform"]
      interval: 10s
      retries: 5

  # ── Redis Cache ──────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: nirf_redis
    command: redis-server --requirepass nirf_redis_password
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # ── FastAPI Backend ──────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nirf_backend
    environment:
      DATABASE_URL: postgresql://nirf_user:nirf_secure_password@postgres:5432/nirf_platform
      REDIS_URL: redis://:nirf_redis_password@redis:6379/0
      JWT_SECRET_KEY: change-this-secret-key-in-production-use-256-bit
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ENVIRONMENT: production
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4

  # ── Celery Worker (Background Jobs) ─────────────────────────
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nirf_celery
    environment:
      DATABASE_URL: postgresql://nirf_user:nirf_secure_password@postgres:5432/nirf_platform
      REDIS_URL: redis://:nirf_redis_password@redis:6379/0
    depends_on:
      - postgres
      - redis
    command: celery -A app.celery_app worker --loglevel=info --concurrency=2

  # ── Next.js Frontend ─────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: nirf_frontend
    environment:
      NEXT_PUBLIC_API_URL: http://backend:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
